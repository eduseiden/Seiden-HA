name: "Seiden EVO Bridge"
version: "0.1.0"
slug: "seiden_evo_bridge"
description: "Integra leitores EVO Facial ao Home Assistant via eventos"
image: ghcr.io/home-assistant/{arch}-base-python
startup: services
boot: auto
init: false
host_network: true
hassio_api: true
homeassistant_api: true
arch:
  - amd64

options:
  poll_interval: 2
  ha_event: "seiden_evo_access"
  readers:
    - name: "Recepção"
      ip: "192.168.4.157"
      password: "1234"

schema:
  poll_interval: int
  ha_event: str
  readers:
    - name: str
      ip: str
      password: password
